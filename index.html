<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanbanFlow - Project Management Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* Critical above-the-fold CSS */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Rajdhani', sans-serif; 
            background: #0a0a14; 
            color: #e0e0ff; 
            min-height: 100vh; 
            overflow-x: hidden;
        }
        .loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #0a0a14;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            transition: opacity 0.3s;
        }
        .loading.hidden { opacity: 0; pointer-events: none; }
        .loading-spinner {
            width: 50px; height: 50px;
            border: 3px solid #12121e;
            border-top-color: #00d9ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .app { opacity: 0; transition: opacity 0.3s; }
        .app.loaded { opacity: 1; }
        .error-banner {
            background: #ff4757;
            color: white;
            padding: 12px 20px;
            text-align: center;
            font-weight: 600;
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 1000;
        }
    </style>
</head>
<body>
    <div class="loading" id="loading">
        <div class="loading-spinner"></div>
        <p>Loading KanbanFlow...</p>
    </div>

    <div class="error-banner" id="credentials-error" style="display: none;">
        Supabase credentials not injected
    </div>

    <div class="app" id="app">
        <!-- Auth gate will be rendered here by app.js -->
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
